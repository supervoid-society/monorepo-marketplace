name: Deploy Services

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    strategy:
      matrix:
        include:
          - service: auth-services
            name: auth-services
            entry_point: src/index.ts
            comp_date: "2025-12-14"
          - service: crud-services
            name: crud-services
            entry_point: src/index.ts
            comp_date: "2025-12-14"
          - service: marketplace-frontend
            name: marketplace-frontend
            entry_point: worker/index.js
            comp_date: "2025-12-13"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Build (Frontend only)
        if: matrix.service == 'marketplace-frontend'
        run: npm run build
        working-directory: ${{ matrix.service }}

      - name: Verify Token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is EMPTY or NOT FOUND. Check GitHub Repo Settings > Secrets."
            exit 1
          else
            echo "Token found (length: ${#CLOUDFLARE_API_TOKEN})"
          fi

      - name: Prepare Deployment Arguments
        id: prep
        run: |
          if [ "${{ matrix.service }}" == "marketplace-frontend" ]; then
            echo "args=--var VITE_AUTH_SERVICE_URL:${{ secrets.VITE_AUTH_SERVICE_URL }} --var VITE_CRUD_SERVICE_URL:${{ secrets.VITE_CRUD_SERVICE_URL }}" >> $GITHUB_OUTPUT
          else
            echo "args=--var JWT_SECRET:${{ secrets.JWT_SECRET }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ${{ matrix.service }}
          command: deploy ${{ matrix.entry_point }} --name ${{ matrix.name }} --compatibility-date ${{ matrix.comp_date }} ${{ steps.prep.outputs.args }} --minify
